spring:
  data:
    redis:
      host: localhost
      port: 16379

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    root: error
    org.springframework: error
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off
    com.zaxxer.hikari: off