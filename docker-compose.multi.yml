services:
  nginx:
    image: nginx:1.27-alpine
    container_name: coffee-nginx
    ports:
      - "18000:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2

  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coffee-app1
    ports:
      - "18080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "local"
      DB_URL: "jdbc:mysql://mysql:3306/coffee_order?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true"
      DB_USERNAME: "root"
      DB_PASSWORD: "1234"
      SERVER_PORT: "8080"
    depends_on:
      mysql:
        condition: service_healthy

  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coffee-app2
    ports:
      - "18081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "docker"
      DB_URL: "jdbc:mysql://mysql:3306/coffee_order?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true"
      DB_USERNAME: "root"
      DB_PASSWORD: "1234"
      SERVER_PORT: "8080"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: coffee-mysql
    ports:
      - "13306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: "coffee_order"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1234"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - coffee-mysql-data:/var/lib/mysql

volumes:
  coffee-mysql-data: