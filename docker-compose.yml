services:
  nginx:
    image: nginx:1.27-alpine
    container_name: coffee-nginx
    ports:
      - "18000:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2

  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coffee-app1
    ports:
      - "18080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "docker"
      DB_URL: "jdbc:mysql://mysql:3306/coffee_order?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true"
      DB_USERNAME: "root"
      DB_PASSWORD: "1234"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      SERVER_PORT: "8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coffee-app2
    ports:
      - "18081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "docker"
      DB_URL: "jdbc:mysql://mysql:3306/coffee_order?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true"
      DB_USERNAME: "root"
      DB_PASSWORD: "1234"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      SERVER_PORT: "8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: coffee-mysql
    ports:
      - "13306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: "coffee_order"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1234"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - coffee-mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: coffee-redis
    ports:
      - "16379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - coffee-redis-data:/data

  kafka:
    image: apache/kafka:3.7.0
    container_name: coffee-kafka
    ports:
      - "19092:19092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  coffee-mysql-data:
  coffee-redis-data: